<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 个人网站管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .sidebar { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid #6EA4D2; }
        .content-area { min-height: calc(100vh - 64px); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="sidebar w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold">网站管理后台</h1>
                <p class="text-sm text-gray-400 mt-1">张伟健个人网站</p>
            </div>
            
            <nav class="flex-1 py-4 overflow-y-auto">
                <a href="#dashboard" class="nav-item active flex items-center px-6 py-3 transition" data-page="dashboard">
                    <i class="fas fa-tachometer-alt w-6"></i>
                    <span>仪表盘</span>
                </a>
                <a href="#profile" class="nav-item flex items-center px-6 py-3 transition" data-page="profile">
                    <i class="fas fa-user w-6"></i>
                    <span>个人资料</span>
                </a>
                <a href="#skills" class="nav-item flex items-center px-6 py-3 transition" data-page="skills">
                    <i class="fas fa-tools w-6"></i>
                    <span>技能管理</span>
                </a>
                <a href="#experiences" class="nav-item flex items-center px-6 py-3 transition" data-page="experiences">
                    <i class="fas fa-briefcase w-6"></i>
                    <span>工作经历</span>
                </a>
                <a href="#education" class="nav-item flex items-center px-6 py-3 transition" data-page="education">
                    <i class="fas fa-graduation-cap w-6"></i>
                    <span>教育经历</span>
                </a>
                <a href="#projects" class="nav-item flex items-center px-6 py-3 transition" data-page="projects">
                    <i class="fas fa-project-diagram w-6"></i>
                    <span>项目管理</span>
                </a>
                <a href="#ai-demos" class="nav-item flex items-center px-6 py-3 transition" data-page="ai-demos">
                    <i class="fas fa-robot w-6"></i>
                    <span>AI Demo</span>
                </a>
                <a href="#documents" class="nav-item flex items-center px-6 py-3 transition" data-page="documents">
                    <i class="fas fa-file-alt w-6"></i>
                    <span>文档管理</span>
                </a>
                <a href="#settings" class="nav-item flex items-center px-6 py-3 transition" data-page="settings">
                    <i class="fas fa-cog w-6"></i>
                    <span>系统设置</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-700">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 flex items-center justify-center">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium" id="userName">管理员</p>
                        <button onclick="logout()" class="text-xs text-gray-400 hover:text-white">退出登录</button>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- 顶部栏 -->
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6">
                <h2 class="text-xl font-semibold text-gray-800" id="pageTitle">仪表盘</h2>
                <div class="flex items-center space-x-4">
                    <a href="../../index.html" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm">
                        <i class="fas fa-external-link-alt mr-1"></i>查看网站
                    </a>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-area overflow-y-auto p-6" id="contentArea">
                <!-- 动态加载页面内容 -->
            </div>
        </main>
    </div>

    <!-- 通用模态框 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-semibold">标题</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modalContent" class="p-6">
                <!-- 动态内容 -->
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
                <button id="modalConfirmBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">确认</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
            <i class="fas fa-check-circle mr-2"></i>
            <span id="toastMessage">操作成功</span>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8313/api';
        
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('admin_token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return token;
        }
        
        const token = checkAuth();
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
        document.getElementById('userName').textContent = user.username || '管理员';
        
        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.href = 'login.html';
        }
        
        // API请求封装
        async function apiRequest(url, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...options,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    return await response.json();
                } else {
                    const text = await response.text();
                    console.error('API返回非JSON数据:', text.substring(0, 200));
                    return { success: false, message: '服务器返回数据格式错误' };
                }
            } catch (error) {
                console.error('API请求失败:', error);
                return { success: false, message: '网络请求失败: ' + error.message };
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        // 处理简历文件选择
        window.handleResumeFileSelect = async (input) => {
            const file = input.files[0];
            if (!file) return;
            
            // 立即上传文件
            const uploadResult = await uploadFile(file, 'resume');
            if (uploadResult.success) {
                // 更新显示
                updateResumeDisplay(uploadResult.filename);
                document.getElementById('resumeUrlInput').value = uploadResult.filename;
                showToast('简历上传成功');
            } else {
                showToast(uploadResult.message || '上传失败', 'error');
            }
        };
        
        // 更新简历显示状态
        function updateResumeDisplay(filename) {
            const uploadArea = document.getElementById('resumeUploadArea');
            const fileArea = document.getElementById('resumeFileArea');
            const fileNameEl = document.getElementById('resumeFileName');
            const downloadLink = document.getElementById('resumeDownloadLink');
            
            if (filename) {
                uploadArea.classList.add('hidden');
                fileArea.classList.remove('hidden');
                fileNameEl.textContent = filename;
                downloadLink.href = `${API_BASE}/upload/${filename}`;
            } else {
                uploadArea.classList.remove('hidden');
                fileArea.classList.add('hidden');
                fileNameEl.textContent = '';
                downloadLink.href = '#';
            }
        }
        
        // 删除简历文件
        window.deleteResumeFile = async () => {
            if (!confirm('确定要删除简历文件吗？')) return;
            
            document.getElementById('resumeUrlInput').value = '';
            document.getElementById('resumeFile').value = '';
            updateResumeDisplay(null);
            showToast('简历已删除，请保存修改');
        };
        
        // ==================== 维护图标和图片上传 ====================
        // 处理维护图标选择
        window.handleMaintenanceIconSelect = async (input) => {
            const file = input.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            const uploadResult = await uploadFile(file, 'image');
            if (uploadResult.success) {
                updateMaintenanceIconDisplay(uploadResult.filename);
                document.getElementById('maintenanceIconInput').value = uploadResult.filename;
                showToast('维护图标上传成功');
            } else {
                showToast(uploadResult.message || '上传失败', 'error');
            }
        };
        
        // 更新维护图标显示
        function updateMaintenanceIconDisplay(filename) {
            const uploadArea = document.getElementById('maintenanceIconUpload');
            const previewArea = document.getElementById('maintenanceIconPreview');
            const imgEl = document.getElementById('maintenanceIconImg');
            const nameEl = document.getElementById('maintenanceIconName');
            
            if (filename) {
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
                imgEl.src = `${API_BASE}/upload/${filename}`;
                nameEl.textContent = filename;
            } else {
                uploadArea.classList.remove('hidden');
                previewArea.classList.add('hidden');
                imgEl.src = '';
                nameEl.textContent = '';
            }
        }
        
        // 删除维护图标
        window.deleteMaintenanceIcon = () => {
            if (!confirm('确定要删除维护图标吗？')) return;
            
            document.getElementById('maintenanceIconInput').value = '';
            document.getElementById('maintenanceIconFile').value = '';
            updateMaintenanceIconDisplay(null);
            showToast('维护图标已删除，请保存设置');
        };
        
        // 处理维护图片选择
        window.handleMaintenanceImageSelect = async (input) => {
            const file = input.files[0];
            if (!file) return;
            
            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            const uploadResult = await uploadFile(file, 'image');
            if (uploadResult.success) {
                updateMaintenanceImageDisplay(uploadResult.filename);
                document.getElementById('maintenanceImageInput').value = uploadResult.filename;
                showToast('维护图片上传成功');
            } else {
                showToast(uploadResult.message || '上传失败', 'error');
            }
        };
        
        // 更新维护图片显示
        function updateMaintenanceImageDisplay(filename) {
            const uploadArea = document.getElementById('maintenanceImageUpload');
            const previewArea = document.getElementById('maintenanceImagePreview');
            const imgEl = document.getElementById('maintenanceImageImg');
            const nameEl = document.getElementById('maintenanceImageName');
            
            if (filename) {
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
                imgEl.src = `${API_BASE}/upload/${filename}`;
                nameEl.textContent = filename;
            } else {
                uploadArea.classList.remove('hidden');
                previewArea.classList.add('hidden');
                imgEl.src = '';
                nameEl.textContent = '';
            }
        }
        
        // 删除维护图片
        window.deleteMaintenanceImage = () => {
            if (!confirm('确定要删除维护图片吗？')) return;
            
            document.getElementById('maintenanceImageInput').value = '';
            document.getElementById('maintenanceImageFile').value = '';
            updateMaintenanceImageDisplay(null);
            showToast('维护图片已删除，请保存设置');
        };
        
        // 文件上传函数
        async function uploadFile(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('type', type);
            
            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: formData
                });
                return await response.json();
            } catch (error) {
                console.error('上传失败:', error);
                return { success: false, message: error.message };
            }
        }
        
        // 模态框操作
        function openModal(title, content, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalConfirmBtn').onclick = () => {
                onConfirm();
                closeModal();
            };
        }
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
        
        // 页面内容生成函数
        const pageContents = {
            dashboard: () => `
                <div class="fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-500 text-sm">总访问量</p>
                                    <p class="text-2xl font-bold" id="totalVisits">-</p>
                                </div>
                                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-eye text-blue-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-500 text-sm">今日访问</p>
                                    <p class="text-2xl font-bold" id="todayVisits">-</p>
                                </div>
                                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-chart-line text-green-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-500 text-sm">项目数量</p>
                                    <p class="text-2xl font-bold" id="projectCount">-</p>
                                </div>
                                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-project-diagram text-purple-600"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-500 text-sm">技能数量</p>
                                    <p class="text-2xl font-bold" id="skillCount">-</p>
                                </div>
                                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-tools text-orange-600"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow p-6">
                        <h3 class="text-lg font-semibold mb-4">热门页面</h3>
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">页面</th>
                                    <th class="px-4 py-3 text-right text-sm font-medium text-gray-600">访问量</th>
                                </tr>
                            </thead>
                            <tbody id="pageStatsTable">
                                <tr><td colspan="2" class="px-4 py-4 text-center text-gray-500">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `,
            
            profile: () => `
                <div class="fade-in max-w-4xl mx-auto">
                    <div class="bg-white rounded-xl shadow p-8">
                        <h3 class="text-xl font-semibold mb-6">个人资料</h3>
                        <form id="profileForm" class="space-y-6">

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">姓名</label>

                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                                    <input type="email" name="email" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>

                                    <label class="block text-sm font-medium text-gray-700 mb-2">电话</label>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">位置</label>
                                    <input type="text" name="location" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">简历文件</label>
                                    <div id="resumeAttachmentArea" class="border-2 border-dashed border-gray-300 rounded-lg p-4">
                                        <!-- 无附件状态 -->
                                        <div id="resumeUploadArea" class="text-center">
                                            <input type="file" id="resumeFile" name="resume_file" accept=".pdf,.doc,.docx" class="hidden" onchange="handleResumeFileSelect(this)">
                                            <label for="resumeFile" class="cursor-pointer">
                                                <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                                <p class="text-sm text-gray-600">点击上传简历文件</p>
                                                <p class="text-xs text-gray-400 mt-1">支持 PDF、Word 格式，最大 10MB</p>
                                            </label>
                                        </div>
                                        <!-- 有附件状态 -->
                                        <div id="resumeFileArea" class="hidden">
                                            <div class="flex items-center justify-between">
                                                <div class="flex items-center space-x-3">
                                                    <i class="fas fa-file-alt text-2xl text-blue-500"></i>

                            <div class="flex justify-end">
                                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存修改</button>
                            </div>
                        </form>
                    </div>
                </div>
            `,
            
            skills: () => `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold">技能管理</h3>
                        <div class="flex space-x-3">
                            <button onclick="openSkillCategoryModal()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i class="fas fa-folder mr-2"></i>分类管理
                            </button>
                            <button onclick="openSkillModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i class="fas fa-plus mr-2"></i>添加技能
                            </button>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow overflow-hidden">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">技能名称</th>
                                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">分类</th>
                                    <th class="px-4 py-3 text-right text-sm font-medium text-gray-600">操作</th>
                                </tr>
                            </thead>
                            <tbody id="skillsTable">
                                <tr><td colspan="3" class="px-4 py-4 text-center text-gray-500">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `,
            
            'skill-categories': () => `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold">技能分类管理</h3>
                        <div class="flex space-x-3">
                            <button onclick="loadPage('skills')" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i class="fas fa-arrow-left mr-2"></i>返回技能管理
                            </button>
                            <button onclick="openSkillCategoryFormModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i class="fas fa-plus mr-2"></i>添加分类
                            </button>

                        <textarea name="description" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="描述在校期间的课程、活动等"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">主要成就</label>
                        <textarea name="achievements" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="如：获得优秀毕业生称号、奖学金等"></textarea>
                    </div>
                </form>
            `;
            
            openModal(title, content, async () => {
                const form = document.getElementById('educationForm');
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);
                data.is_current = form.querySelector('[name="is_current"]').checked ? 1 : 0;
                data.sort_order = 0;
                
                const url = isEdit ? `/education/${id}` : '/education';
                const method = isEdit ? 'PUT' : 'POST';
                
                const result = await apiRequest(url, { method, body: JSON.stringify(data) });
                if (result.success) {
                    showToast(isEdit ? '教育经历更新成功' : '教育经历添加成功');
                    pageLoaders.education();
                }
            });
            
            if (isEdit) {
                apiRequest(`/education/${id}`).then(result => {
                    if (result.success && result.data) {
                        const form = document.getElementById('educationForm');
                        Object.keys(result.data).forEach(key => {
                            const input = form.querySelector(`[name="${key}"]`);
                            if (input) {
                                if (input.type === 'checkbox') {
                                    input.checked = result.data[key] == 1;
                                } else {
                                    input.value = result.data[key] || '';
                                }
                            }
                        });
                    }
                });
            }
        };
        
        window.editEducation = (id) => openEducationModal(id);
        
        window.deleteEducation = async (id) => {
            if (confirm('确定要删除这条教育经历吗？')) {
                const result = await apiRequest(`/education/${id}`, { method: 'DELETE' });
                if (result.success) {
                    showToast('教育经历删除成功');
                    pageLoaders.education();
                }
            }
        };
        
        // ==================== 技能分类管理 ====================
        window.openSkillCategoryModal = () => {
            loadPage('skill-categories');
        };
        
        window.openSkillCategoryFormModal = (id = null) => {
            const isEdit = id !== null;
            const title = isEdit ? '编辑分类' : '添加分类';
            const content = `
                <form id="skillCategoryForm" class="space-y-4">
                    <input type="hidden" name="id" value="${isEdit ? id : ''}">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分类名称 <span class="text-red-500">*</span></label>
                        <input type="text" name="name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                        <textarea name="description" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="分类描述说明"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">排序</label>
                        <input type="number" name="sort_order" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value="0">
                    </div>
                </form>
            `;
            
            openModal(title, content, async () => {
                const form = document.getElementById('skillCategoryForm');
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);
                data.sort_order = parseInt(data.sort_order) || 0;
                
                const url = isEdit ? `/skill-categories/${id}` : '/skill-categories';
                const method = isEdit ? 'PUT' : 'POST';
                
                const result = await apiRequest(url, { method, body: JSON.stringify(data) });
                if (result.success) {
                    showToast(isEdit ? '分类更新成功' : '分类添加成功');
                    closeModal();
                    pageLoaders['skill-categories']();
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            });
            
            if (isEdit) {
                apiRequest(`/skill-categories/${id}`).then(result => {
                    if (result.success && result.data) {
                        const form = document.getElementById('skillCategoryForm');
                        Object.keys(result.data).forEach(key => {
                            const input = form.querySelector(`[name="${key}"]`);
                            if (input) input.value = result.data[key] || '';
                        });
                    }
                });
            }
        };
        
        window.editSkillCategory = (id) => openSkillCategoryFormModal(id);
        
        window.deleteSkillCategory = async (id) => {
            if (confirm('确定要删除这个分类吗？该分类下的技能需要重新分类。')) {
                const result = await apiRequest(`/skill-categories/${id}`, { method: 'DELETE' });
                if (result.success) {
                    showToast('分类删除成功');
                    pageLoaders['skill-categories']();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            }
        };
    </script>
</body>
</html>
