<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo预览 - 项目开发中</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-primary: #6EA4D2;
            --color-secondary: #8B9DC5;
            --color-accent: #6BBCCF;
            --bg-warm: #F5F5F0;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #E9E7F5 0%, #D9E8E3 50%, #F5F0C6 100%);
            min-height: 100vh;
        }
        
        .placeholder-container {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .construction-icon {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }
        
        .progress-bar {
            animation: progress 3s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }
        
        .floating-shape {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- 背景装饰元素 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="floating-shape absolute top-20 left-10 w-32 h-32 bg-[#6EA4D2] opacity-10 rounded-full"></div>
        <div class="floating-shape absolute bottom-20 right-10 w-48 h-48 bg-[#8B9DC5] opacity-10 rounded-full" style="animation-delay: 1s;"></div>
        <div class="floating-shape absolute top-1/2 left-1/4 w-24 h-24 bg-[#6BBCCF] opacity-10 rounded-full" style="animation-delay: 2s;"></div>
    </div>
    
    <!-- 主要内容区域 -->
    <div class="placeholder-container w-full max-w-2xl relative z-10">
        <!-- 卡片容器 -->
        <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-12 text-center">
            <!-- 图标区域 -->
            <div class="construction-icon mb-8">
                <div class="w-32 h-32 mx-auto bg-gradient-to-br from-[#6EA4D2] to-[#8B9DC5] rounded-full flex items-center justify-center shadow-lg">
                    <i class="fas fa-tools text-5xl text-white"></i>
                </div>
            </div>
            
            <!-- 标题 -->
            <h1 class="text-3xl md:text-4xl font-bold mb-4" style="color: var(--text-primary);">
                项目开发中
            </h1>
            
            <!-- 副标题 -->
            <p class="text-lg md:text-xl mb-6" style="color: var(--text-secondary);">
                该项目的Demo正在紧锣密鼓地开发中
            </p>
            
            <!-- 详细说明 -->
            <div class="bg-gray-50 rounded-2xl p-6 mb-8 text-left">
                <div class="flex items-start mb-4">
                    <i class="fas fa-info-circle text-[#6EA4D2] mt-1 mr-3"></i>
                    <div>
                        <h3 class="font-semibold mb-1" style="color: var(--text-primary);">当前状态</h3>
                        <p class="text-sm" style="color: var(--text-secondary);">我们正在努力完善该项目的交互演示，预计很快上线。</p>
                    </div>
                </div>
                <div class="flex items-start">
                    <i class="fas fa-lightbulb text-[#6BBCCF] mt-1 mr-3"></i>
                    <div>
                        <h3 class="font-semibold mb-1" style="color: var(--text-primary);">替代方案</h3>
                        <p class="text-sm" style="color: var(--text-secondary);">您可以查看项目详情页了解更多信息，或浏览其他已完成的项目Demo。</p>
                    </div>
                </div>
            </div>
            
            <!-- 进度指示器 -->
            <div class="mb-8">
                <div class="flex justify-between text-sm mb-2" style="color: var(--text-secondary);">
                    <span>开发进度</span>
                    <span id="progressText">进行中...</span>
                </div>
                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div class="progress-bar h-full bg-gradient-to-r from-[#6EA4D2] to-[#6BBCCF] rounded-full"></div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="javascript:history.back()" class="inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-[#6EA4D2] to-[#8B9DC5] text-white rounded-full font-semibold hover:shadow-lg transition-all duration-300 hover:-translate-y-1">
                    <i class="fas fa-arrow-left mr-2"></i>
                    返回项目详情
                </a>
                <a href="../index.html#works" class="inline-flex items-center justify-center px-6 py-3 border-2 border-[#6EA4D2] text-[#6EA4D2] rounded-full font-semibold hover:bg-[#6EA4D2] hover:text-white transition-all duration-300">
                    <i class="fas fa-th-large mr-2"></i>
                    浏览其他项目
                </a>
            </div>
            
            <!-- 项目信息（动态显示） -->
            <div id="projectInfo" class="mt-8 pt-6 border-t border-gray-200 hidden">
                <p class="text-sm" style="color: var(--text-secondary);">
                    项目ID: <span id="projectId" class="font-mono bg-gray-100 px-2 py-1 rounded"></span>
                </p>
            </div>
        </div>
        
        <!-- 底部版权 -->
        <div class="text-center mt-6 text-sm" style="color: var(--text-secondary);">
            <p>&copy; 2024 张伟健的产品作品集</p>
        </div>
    </div>
    
    <script>
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        // 检查项目ID
        function checkProjectId() {
            const projectId = getUrlParam('id');
            const projectInfo = document.getElementById('projectInfo');
            const projectIdSpan = document.getElementById('projectId');
            
            if (projectId) {
                projectInfo.classList.remove('hidden');
                projectIdSpan.textContent = projectId;
                
                // 项目1236强制显示此页面
                if (projectId === '1236') {
                    document.querySelector('h1').textContent = 'Demo暂不可用';
                    document.querySelector('.text-lg').textContent = '该项目Demo正在重构优化中，敬请期待';
                }
            }
        }
        
        // 检查是否应该显示此页面
        function shouldShowPlaceholder() {
            const projectId = getUrlParam('id');
            const demoUrl = getUrlParam('demo');
            
            // 强制显示的项目ID列表
            const forcePlaceholderIds = ['1236'];
            
            // 如果没有demo URL，或者是强制显示的项目，则显示此页面
            if (!demoUrl || forcePlaceholderIds.includes(projectId)) {
                return true;
            }
            
            // 否则跳转到实际demo
            window.location.href = decodeURIComponent(demoUrl);
            return false;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 先检查是否应该显示此页面
            if (shouldShowPlaceholder()) {
                checkProjectId();
            }
        });
        
        // 模拟进度更新
        let progress = 0;
        const progressText = document.getElementById('progressText');
        const progressInterval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress >= 90) {
                progress = 90;
                clearInterval(progressInterval);
                progressText.textContent = '即将完成...';
            } else {
                progressText.textContent = Math.round(progress) + '%';
            }
        }, 500);
    </script>
</body>
</html>
